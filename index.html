<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="O aplicație web premium și receptivă pentru lista de cumpărături, concepută pentru a vă gestiona cu ușurință cumpărăturile.">
    <title>PantryPulse — Planificator de Cumpărături Premium</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="style.css?v=4">
</head>
<body>
    <div class="app-container">
        <!-- Header Section -->
        <header class="app-header">
            <div class="logo-area">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <path d="M16 10a4 4 0 0 1-8 0"></path>
                    </svg>
                </div>
                <h1>PantryPulse</h1>
            </div>
            <p class="tagline">Organizează-ți lista de cumpărături fără efort</p>
        </header>

        <!-- Main Workspace -->
        <main class="app-main">
            <!-- Add Item Form -->
            <section class="form-section card">
                <h2 class="section-title" id="form-title">Adaugă alimente</h2>
                <form id="grocery-form" autocomplete="off">
                    <div class="form-group">
                        <label for="item-name">Denumire aliment</label>
                        <input type="text" id="item-name" placeholder="ex. Avocado Organic" required>
                    </div>

                    <div class="form-row three-cols">
                        <div class="form-group col-qty">
                            <label for="item-quantity">Cantitate</label>
                            <input type="number" id="item-quantity" min="0.01" step="any" value="1" required>
                        </div>
                        <div class="form-group col-unit">
                            <label for="item-unit">Unitate</label>
                            <select id="item-unit">
                                <option value="buc.">bucăți (buc.)</option>
                                <option value="kg">kilograme (kg)</option>
                                <option value="g">grame (g)</option>
                                <option value="l">litri (l)</option>
                                <option value="bax">baxuri (bax)</option>
                                <option value="pachet">pachete (pachet)</option>
                            </select>
                        </div>
                        <div class="form-group col-supplier">
                            <label for="item-supplier">Furnizor</label>
                            <input type="text" id="item-supplier" list="suppliers-list" placeholder="ex. Lidl, Kaufland">
                            <datalist id="suppliers-list">
                                <option value="Lidl">
                                <option value="Penny">
                                <option value="Carrefour">
                                <option value="Kaufland">
                                <option value="aprozar">
                                <option value="piata">
                            </datalist>
                        </div>
                    </div>

                    <div class="form-buttons">
                        <button type="submit" id="add-btn" class="btn btn-primary">
                            <svg id="add-btn-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                            <span id="submit-btn-text">Adaugă în listă</span>
                        </button>
                        <button type="button" id="cancel-btn" class="btn btn-secondary-outline" style="display: none;">
                            Renunță
                        </button>
                    </div>
                </form>
            </section>

            <!-- List and Actions -->
            <section class="list-section card">
                <div class="list-header">
                    <h2 class="section-title">Lista ta</h2>
                    <div class="list-stats" id="list-stats">
                        <span class="stat-badge"><strong id="completed-count">0</strong> / <span id="total-count">0</span> produse</span>
                    </div>
                </div>

                <!-- Search & Filters -->
                <div class="filters-container">
                    <div class="search-box">
                        <svg class="search-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                        <input type="text" id="search-input" placeholder="Caută produse sau furnizori...">
                    </div>
                    <div class="filter-tabs">
                        <button class="filter-tab active" data-filter="all" id="filter-all">Toate</button>
                        <button class="filter-tab" data-filter="active" id="filter-active">De cumpărat</button>
                        <button class="filter-tab" data-filter="completed" id="filter-completed">Cumpărate</button>
                    </div>
                </div>

                <!-- Grocery List Items -->
                <div class="list-container">
                    <ul id="grocery-list" class="grocery-list">
                        <!-- Items dynamically injected here -->
                    </ul>
                    <!-- Empty State -->
                    <div id="empty-state" class="empty-state">
                        <div class="empty-icon">
                            <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="9" cy="21" r="1"></circle>
                                <circle cx="20" cy="21" r="1"></circle>
                                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                            </svg>
                        </div>
                        <p class="empty-text">Lista ta de cumpărături este goală</p>
                        <p class="empty-subtext">Adaugă câteva produse mai sus pentru a începe!</p>
                    </div>
                </div>

                <!-- Footer List Actions -->
                <div class="list-actions" id="list-actions" style="display: none;">
                    <button id="clear-all-btn" class="btn btn-danger-outline">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        </svg>
                        Șterge tot
                    </button>
                </div>
            </section>
        </main>
    </div>

    <!-- App Logic -->
    <script src="app.js?v=2"></script>
</body>
</html>
